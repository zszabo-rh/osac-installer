{{- if .Values.capiProvider.enabled }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.capiProvider.agentNamespace }}
  labels:
    {{- include "osac.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: capi-provider-role
  namespace: {{ .Values.capiProvider.agentNamespace }}
  labels:
    {{- include "osac.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - agent-install.openshift.io
    resources:
      - agents
    verbs:
      - "*"
{{- end }}
