# Open Sovereign AI Cloud - Unified Helm Values
# This values file configures all OSAC components via the umbrella chart.

# --- Operator CRDs ---
operatorCrds:
  install: true

# --- Operator ---
operator:
  image:
    repository: ghcr.io/osac-project/osac-operator
    tag: latest
    pullPolicy: Always
  replicaCount: 1
  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi
  aap:
    url: ""
    token: ""
    insecureSkipVerify: "true"
    statusPollInterval: "30s"
    templatePrefix: "osac"
  fulfillment:
    serverAddress: "fulfillment-api:8000"
    tokenFile: "/var/run/secrets/kubernetes.io/serviceaccount/token"
  controllers:
    clusterOrder: true
    computeInstance: true
    tenant: true
    networking: true
  configSecret:
    name: "osac-config"
    optional: true

# --- Fulfillment Service ---
service:
  variant: openshift
  # [REQUIRED] Hostname for the external API Route (e.g. fulfillment-api-osac.apps.mycluster.example.com)
  externalHostname: ""
  # [REQUIRED] Hostname for the internal API Route (e.g. fulfillment-internal-api-osac.apps.mycluster.example.com)
  internalHostname: ""
  images:
    service: ghcr.io/osac-project/fulfillment-service:latest
    envoy: ghcr.io/osac-project/envoy:v1.33.0
  certs:
    issuerRef:
      kind: ClusterIssuer
      name: default-ca
    caBundle:
      configMap: ca-bundle
  auth:
    issuerUrl: "https://REPLACE_ME"
    controllerCredentials: []
  idp:
    provider: keycloak
    url: ""
    credentials: []
  database:
    connection: []
    # Example:
    # connection:
    # - secret:
    #     name: fulfillment-db
    #     items:
    #     - key: url
    #       param: url
  log:
    level: info
    headers: false
    bodies: false

# --- AAP ---
aap:
  aap:
    instance:
      enabled: true
      name: "osac-aap"
      controller:
        disabled: false
      eda:
        disabled: false
      hub:
        disabled: true
      lightspeed:
        disabled: true
      noLog: true
      redisMode: standalone
      routeTlsTerminationMechanism: Edge
      imagePullPolicy: IfNotPresent
  bootstrap:
    enabled: true
    image: ghcr.io/osac-project/osac-aap:latest
    cliImage: quay.io/openshift/origin-cli:4.20.0
    backoffLimit: 15
    gateway:
      hostname: ""
    eda:
      hostname: ""
    controller:
      hostname: ""
  configAsCode:
    manifestSecret: "config-as-code-manifest-ig"
    secret: "config-as-code-ig"
    eeImage: ""
    projectGitUri: ""
    projectGitBranch: ""

# --- Instance Groups ---
instanceGroups:
  enabled: true
  cluster:
    config: {}
  network:
    config: {}

# --- Bundled PostgreSQL ---
# When enabled, auto-creates the fulfillment-db secret and client certificate.
# Use this for dev/test with the bundled postgres chart
# (helm install fulfillment-db base/osac-fulfillment-service/it/charts/postgres/).
# For production, leave disabled and create secrets manually per the deployment guide.
bundledPostgres:
  enabled: false
  database:
    name: service
    user: service

# --- Bare Metal Fulfillment Operator CRDs ---
bmfCrds: {}

# --- Bare Metal Fulfillment Operator ---
bmf:
  enabled: true
  image:
    repository: ghcr.io/osac-project/bare-metal-fulfillment-operator
    tag: latest
    pullPolicy: Always
  replicaCount: 1
  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi
  serviceAccount:
    create: true
    name: ""
  secrets:
    inventoryConfig: "osac-inventory-config"
    managementConfig: "osac-management-config"
    osClouds: "osac-os-clouds"
  configMaps:
    profiles: "osac-profiles"

# --- Hub Access ---
hubAccess:
  enabled: true

# --- Publish Templates ---
publishTemplates:
  enabled: true
  templateCollections: "osac.templates"
  fulfillmentServiceUri: "https://fulfillment-internal-api:8001"

# --- Validation hooks ---
validation:
  enabled: true
  image: quay.io/openshift/origin-cli:4.20.0

# --- Database migration hook ---
# NOTE: Disabled until the 'migrate' subcommand is released in the
# fulfillment-service image. Re-enable once available.
dbMigrate:
  enabled: false
  image: ghcr.io/osac-project/fulfillment-service:latest
  dbUrl: ""
  dbUrlFile: ""

# --- Cluster Fulfillment Instance Group ---
# ConfigMap and Secret for the AAP cluster-fulfillment instance group.
# Carries network backend selection, Netris credentials, SSH config,
# external-access domains, hosted-cluster defaults, and DNS backend config.
clusterFulfillment:
  enabled: false
  config:
    NETWORK_CLASS: ""
    NETWORK_STEPS_COLLECTION: ""
    DNS_CLASS: ""
    DNS_ZONE: ""
    NETRIS_CONTROLLER_URL: ""
    NETRIS_USERNAME: ""
    NETRIS_SITE_ID: ""
    NETRIS_TENANT_ID: ""
    NETRIS_TENANT_NAME: ""
    NETRIS_MGMT_VPC_ID: ""
    NETRIS_MGMT_VPC_NAME: ""
    NETRIS_RESOURCE_CLASS_MAP: ""
    SERVER_SSH_BASTION_HOST: ""
    SERVER_SSH_BASTION_USER: ""
    SERVER_SSH_USER: ""
    SERVER_MGMT_ROUTE_DESTINATION: ""
    SERVER_MGMT_ROUTE_GATEWAY: ""
    EXTERNAL_ACCESS_BASE_DOMAIN: ""
    EXTERNAL_ACCESS_SUPPORTED_BASE_DOMAINS: ""
    EXTERNAL_ACCESS_API_INTERNAL_NETWORK: ""
    HOSTED_CLUSTER_BASE_DOMAIN: ""
    HOSTED_CLUSTER_CONTROLLER_AVAILABILITY_POLICY: ""
    HOSTED_CLUSTER_INFRASTRUCTURE_AVAILABILITY_POLICY: ""
  secret:
    NETRIS_PASSWORD: ""
    AWS_ACCESS_KEY_ID: ""
    AWS_SECRET_ACCESS_KEY: ""
    SERVER_SSH_KEY: ""
    SERVER_SSH_BASTION_KEY: ""

# --- Network Fulfillment Instance Group ---
# ConfigMap and Secret for the AAP networking-operations instance group.
# Carries Netris controller credentials for network resource lifecycle.
networkFulfillment:
  enabled: false
  config:
    NETRIS_CONTROLLER_URL: ""
    NETRIS_USERNAME: ""
    NETRIS_SITE_ID: ""
    NETRIS_TENANT_ID: ""
    NETRIS_TENANT_NAME: ""
  secret:
    NETRIS_PASSWORD: ""
