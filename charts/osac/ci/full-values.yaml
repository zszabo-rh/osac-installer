# Full scenario: everything enabled, exercises all template branches.

operator:
  aap:
    url: "https://aap.example.com/api/controller"
    token: "test-token"
    insecureSkipVerify: "true"
    statusPollInterval: "30s"
    templatePrefix: "osac"
  fulfillment:
    serverAddress: "fulfillment-api:8000"
    tokenFile: "/var/run/secrets/kubernetes.io/serviceaccount/token"

service:
  variant: openshift
  externalHostname: fulfillment-api.example.com
  internalHostname: fulfillment-internal-api.example.com
  auth:
    issuerUrl: https://keycloak.keycloak.svc.cluster.local/realms/osac
    controllerCredentials:
    - secret:
        name: fulfillment-controller-credentials
        items:
        - key: client-id
          param: client-id
  idp:
    provider: keycloak
    url: https://keycloak.keycloak.svc.cluster.local
    credentials:
    - secret:
        name: fulfillment-controller-credentials
        items:
        - key: client-id
          param: client-id
  database:
    connection:
    - secret:
        name: fulfillment-db
        items:
        - key: url
          param: url

aap:
  aap:
    instance:
      enabled: true
      name: "osac-aap"
  bootstrap:
    enabled: true
    image: ghcr.io/osac-project/osac-aap:latest

validation:
  enabled: true

dbMigrate:
  enabled: true
  image: ghcr.io/osac-project/fulfillment-service:latest
  dbUrlFile: "/etc/fulfillment-service/db/url"

clusterFulfillment:
  enabled: true
  config:
    NETWORK_CLASS: "netris"
    NETWORK_STEPS_COLLECTION: "netris.steps"
    DNS_CLASS: "dns.route53.dns"
    DNS_ZONE: "test.example.com"
    NETRIS_CONTROLLER_URL: "https://test-ctl.netris.io"
    NETRIS_USERNAME: "testuser"
    NETRIS_SITE_ID: "1"
    NETRIS_TENANT_ID: "1"
    NETRIS_TENANT_NAME: "Admin"
    EXTERNAL_ACCESS_BASE_DOMAIN: "test.example.com"
    EXTERNAL_ACCESS_SUPPORTED_BASE_DOMAINS: "test.example.com"
    EXTERNAL_ACCESS_API_INTERNAL_NETWORK: "hypershift"
    HOSTED_CLUSTER_BASE_DOMAIN: "test.example.com"
    HOSTED_CLUSTER_CONTROLLER_AVAILABILITY_POLICY: "SingleReplica"
    HOSTED_CLUSTER_INFRASTRUCTURE_AVAILABILITY_POLICY: "SingleReplica"
  secret:
    NETRIS_PASSWORD: "test-password"

networkFulfillment:
  enabled: true
  config:
    NETRIS_CONTROLLER_URL: "https://test-ctl.netris.io"
    NETRIS_USERNAME: "testuser"
    NETRIS_SITE_ID: "1"
    NETRIS_TENANT_ID: "1"
    NETRIS_TENANT_NAME: "Admin"
  secret:
    NETRIS_PASSWORD: "test-password"
