apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: osac-integration

# This applies a name prefix to cluster-scoped resources (ClusterRoles,
# ClusterRoleBindings) but does not modify namespaced resources.
transformers:
- prefixTransformer.yaml

labels:
- includeSelectors: true
  pairs:
    app.kubernetes.io/managed-by: kustomize
    environment: integration

resources:
- ../../base

generatorOptions:
  disableNameSuffixHash: true

secretGenerator:
# This expects to find quay credentials in
# files/quay-pull-secret.json.
- name: quay-pull-secret
  files:
  - .dockerconfigjson=files/quay-pull-secret.json
  type: kubernetes.io/dockerconfigjson

# This expects to find an AAP license manifest
# in files/license.zip.
- name: config-as-code-manifest-ig
  files:
    - license.zip=files/license.zip
  options:
    labels:
      osac.openshift.io/project: osac-aap

- name: config-as-code-ig
  options:
    disableNameSuffixHash: true
  literals:
    - AAP_EE_IMAGE=ghcr.io/osac-project/osac-aap:sha-89f41e7
    - AAP_PROJECT_GIT_URI="https://github.com/osac-project/osac-aap"
    - AAP_PROJECT_GIT_BRANCH=89f41e712b550cae30fe9569c8a9614e2c462208

- name: cluster-fulfillment-ig
  options:
    labels:
      osac.openshift.io/project: osac-aap

# Base defaults for the cluster-fulfillment-ig ConfigMap.
# scripts/aap-configuration.sh may override these with values
# from files/osac-aap-configuration.env after oc apply -k.
configMapGenerator:
- name: cluster-fulfillment-ig
  options:
    labels:
      osac.openshift.io/project: osac-aap
  literals:
    - NETWORK_CLASS=esi
    - NETWORK_STEPS_COLLECTION=osac.steps
    - EXTERNAL_ACCESS_BASE_DOMAIN=box.massopen.cloud
    - EXTERNAL_ACCESS_SUPPORTED_BASE_DOMAINS=box.massopen.cloud
    - EXTERNAL_ACCESS_API_INTERNAL_NETWORK=hypershift
    - HOSTED_CLUSTER_BASE_DOMAIN=box.massopen.cloud
    - HOSTED_CLUSTER_CONTROLLER_AVAILABILITY_POLICY=HighlyAvailable
    - HOSTED_CLUSTER_INFRASTRUCTURE_AVAILABILITY_POLICY=HighlyAvailable

- name: publish-templates-ig
  literals:
    - OSAC_TEMPLATE_COLLECTIONS=osac.templates
    - OSAC_FULFILLMENT_SERVICE_URI=https://fulfillment-internal-api:8001

images:
  - name: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
    newName: quay.io/openshift/origin-cli
    newTag: "4.20.0"

patches:
  # kustomize nameReference tracking breaks when osac-operator and bmf-operator both contribute a
  # ServiceAccount originally named "controller-manager", causing the prefix transformer to reset
  # CRB subjects to the unresolved original. Pin them explicitly to work around the collision.
  - target:
      kind: ClusterRoleBinding
      name: osac-operator-manager-rolebinding
    patch: |-
      - op: replace
        path: /subjects/0/name
        value: osac-operator-controller-manager
      - op: replace
        path: /subjects/0/namespace
        value: osac-integration
  - target:
      kind: ClusterRoleBinding
      name: osac-operator-manager-admin-rolebinding
    patch: |-
      - op: replace
        path: /subjects/0/name
        value: osac-operator-controller-manager
      - op: replace
        path: /subjects/0/namespace
        value: osac-integration
  - target:
      kind: ClusterRoleBinding
      name: osac-operator-metrics-auth-rolebinding
    patch: |-
      - op: replace
        path: /subjects/0/name
        value: osac-operator-controller-manager
      - op: replace
        path: /subjects/0/namespace
        value: osac-integration
  - target:
      kind: ClusterRoleBinding
      name: bmf-operator-manager-rolebinding
    patch: |-
      - op: replace
        path: /subjects/0/name
        value: bmf-operator-controller-manager
      - op: replace
        path: /subjects/0/namespace
        value: osac-integration
  - target:
      kind: ClusterRoleBinding
      name: bmf-operator-metrics-auth-rolebinding
    patch: |-
      - op: replace
        path: /subjects/0/name
        value: bmf-operator-controller-manager
      - op: replace
        path: /subjects/0/namespace
        value: osac-integration
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: fulfillment-controller
      spec:
        template:
          spec:
            containers:
              - name: controller
                imagePullPolicy: Always
                command:
                - /usr/local/bin/fulfillment-service
                - start
                - controller
                - --log-level=debug
                - --log-headers=false
                - --log-bodies=true
                - --ca-file=/etc/fulfillment-controller/tls/cas
                - --auth-issuer-url=https://keycloak-keycloak.apps.osac-integration.svc.massopen.cloud/realms/osac
                - --auth-client-id-file=/etc/fulfillment-controller/credentials/client-id
                - --auth-client-secret-file=/etc/fulfillment-controller/credentials/client-secret
                - --idp-provider=keycloak
                - --idp-url=https://keycloak-keycloak.apps.osac-integration.svc.massopen.cloud
                - --idp-client-id-file=/etc/fulfillment-controller/idp/client-id
                - --idp-client-secret-file=/etc/fulfillment-controller/idp/client-secret
                - --grpc-server-address=fulfillment-internal-api:8001
                - --grpc-keep-alive=5m
                - --grpc-listener-address=0.0.0.0:8000
                - --grpc-listener-tls-crt=/etc/fulfillment-controller/tls/tls.crt
                - --grpc-listener-tls-key=/etc/fulfillment-controller/tls/tls.key
                - --metrics-listener-address=0.0.0.0:8002

  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: fulfillment-grpc-server
      spec:
        template:
          spec:
            containers:
              - name: grpc-server
                command:
                - /usr/local/bin/fulfillment-service
                - start
                - grpc-server
                - --log-level=debug
                - --log-headers=false
                - --log-bodies=true
                - --ca-file=/etc/fulfillment-grpc-server/tls/cas
                - --db-url=postgres://client@fulfillment-database:5432/service?sslmode=verify-full&sslcert=/secrets/cert/tls.crt&sslkey=/secrets/cert/tls.key&sslrootcert=/secrets/cert/ca.crt
                - --grpc-listener-address=0.0.0.0:8000
                - --grpc-listener-tls-crt=/etc/fulfillment-grpc-server/tls/tls.crt
                - --grpc-listener-tls-key=/etc/fulfillment-grpc-server/tls/tls.key
                - --grpc-authn-trusted-token-issuers=https://keycloak-keycloak.apps.osac-integration.svc.massopen.cloud/realms/osac
                - --metrics-listener-address=0.0.0.0:8002
                - --token-signer-crt=/etc/fulfillment-token-signer/tls.crt
                - --token-signer-key=/etc/fulfillment-token-signer/tls.key
                - --token-encryption-crt=/etc/fulfillment-token-encryption/tls.crt
                - --token-issuer=https://fulfillment-api-osac-integration.apps.osac-integration.svc.massopen.cloud

  # Override the console-proxy --token-issuer to use the external FQDN so it
  # matches the iss claim stamped by the grpc-server.
  - target:
      kind: Deployment
      name: fulfillment-console-proxy
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/command/5
        value: --token-issuer=https://fulfillment-api-osac-integration.apps.osac-integration.svc.massopen.cloud

  # Override the console-proxy --console-cors-allowed-origins to use the
  # external FQDN so browser WebSocket Origin headers are accepted.
  - target:
      kind: Deployment
      name: fulfillment-console-proxy
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/command/13
        value: --console-cors-allowed-origins=https://fulfillment-api-osac-integration.apps.osac-integration.svc.massopen.cloud

  # Add the external FQDN to the ingress-proxy certificate so TLS validation
  # succeeds when the console-proxy fetches JWKS via the external hostname.
  - target:
      kind: Certificate
      name: fulfillment-api
    patch: |-
      - op: add
        path: /spec/dnsNames/-
        value: fulfillment-api-osac-integration.apps.osac-integration.svc.massopen.cloud

  - target:
      kind: Deployment
      name: osac-operator-controller-manager
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_ENABLE_COMPUTE_INSTANCE_CONTROLLER
          value: "true"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_ENABLE_TENANT_CONTROLLER
          value: "true"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_ENABLE_NETWORKING_CONTROLLER
          value: "true"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_AAP_TEMPLATE_PREFIX
          value: osac
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_AAP_URL
          value: "https://osac-aap-osac-integration.apps.osac-integration.svc.massopen.cloud/api/controller"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_AAP_TOKEN
          valueFrom:
            secretKeyRef:
              name: osac-aap-api-token
              key: token
              optional: true
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_AAP_INSECURE_SKIP_VERIFY
          value: "true"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_AAP_STATUS_POLL_INTERVAL
          value: "30s"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_FULFILLMENT_SERVER_ADDRESS
          value: fulfillment-internal-api:8001
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_FULFILLMENT_TOKEN_FILE
          value: /var/run/secrets/kubernetes.io/serviceaccount/token
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Always
replacements:
- path: console-proxy-replacements.yaml
