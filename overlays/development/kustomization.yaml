apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: osac-devel

# This applies a name prefix to cluster-scoped resources (ClusterRoles,
# ClusterRoleBindings) but does not modify namespaced resources.
transformers:
- prefixTransformer.yaml

labels:
- includeSelectors: true
  pairs:
    app.kubernetes.io/managed-by: kustomize
    environment: development

resources:
- ../../base
- ./capi-provider-role.yaml

components:
- ../_shared/console-proxy-shared-dev

generatorOptions:
  disableNameSuffixHash: true

secretGenerator:
# This expects to find quay credentials in
# files/quay-pull-secret.json.
- name: quay-pull-secret
  files:
  - .dockerconfigjson=files/quay-pull-secret.json
  type: kubernetes.io/dockerconfigjson

# This expects to find an AAP license manifest
# in files/license.zip.
- name: config-as-code-manifest-ig
  files:
    - license.zip=files/license.zip
  options:
    labels:
      osac.openshift.io/project: osac-aap

- name: config-as-code-ig
  options:
    disableNameSuffixHash: true
  literals:
    - AAP_EE_IMAGE=ghcr.io/osac-project/osac-aap:latest
    - AAP_PROJECT_GIT_URI="https://github.com/osac-project/osac-aap"
    - AAP_PROJECT_GIT_BRANCH=main

- name: cluster-fulfillment-ig
  options:
    labels:
      osac.openshift.io/project: osac-aap

- name: network-fulfillment-ig
  options:
    labels:
      osac.openshift.io/project: osac-aap

- name: bare-metal-fulfillment-ig
  literals:
    - OS_CLOUD=openstack

# Configures the inventory source used for bare metal host discovery.
# Copy files/inventory.yaml.example to files/inventory.yaml and set:
#   name: a display name for this inventory
#   type: the provider type (e.g. openstack)
#   options.openstack.cloud: the cloud name from clouds.yaml to use for host discovery
#   hostClass: the host class identifier
#   networkClass: the network class identifier
# Then update this generator entry to use files/inventory.yaml
- name: osac-inventory-config
  files:
  - files/inventory.yaml.example

# Standard OpenStack clouds.yaml with credentials for the bare metal provider.
# Copy files/clouds.yaml.example to files/clouds.yaml and set:
#   clouds.<name>.auth.auth_url: Keystone endpoint
#   clouds.<name>.auth.project_name, username, password: OpenStack credentials
#   clouds.<name>.region_name: OpenStack region
# Then update this generator entry to use files/clouds.yaml
- name: osac-os-clouds
  files:
    - files/clouds.yaml.example

# Configures the management cloud connection used by the fulfillment service.
# Copy files/management.yaml.example to files/management.yaml and set:
#   name: a display name for this management provider
#   type: the provider type (e.g. openstack)
#   options.openstack.cloud: the cloud name from clouds.yaml to use for management operations
# Then update this generator entry to use files/management.yaml
- name: osac-management-config
  files:
  - files/management.yaml.example

# Base defaults for the cluster-fulfillment-ig ConfigMap.
# scripts/aap-configuration.sh may override these with values
# from files/osac-aap-configuration.env after oc apply -k.
configMapGenerator:
- name: publish-templates-ig
  literals:
    - OSAC_TEMPLATE_COLLECTIONS=osac.templates
    - OSAC_FULFILLMENT_SERVICE_URI=https://fulfillment-internal-api:8001
- name: cluster-fulfillment-ig
  options:
    labels:
      osac.openshift.io/project: osac-aap
  literals:
    - NETWORK_CLASS=esi
    - NETWORK_STEPS_COLLECTION=osac.steps
    - EXTERNAL_ACCESS_BASE_DOMAIN=box.massopen.cloud
    - EXTERNAL_ACCESS_SUPPORTED_BASE_DOMAINS=box.massopen.cloud
    - EXTERNAL_ACCESS_API_INTERNAL_NETWORK=hypershift
    - HOSTED_CLUSTER_BASE_DOMAIN=box.massopen.cloud
    - HOSTED_CLUSTER_CONTROLLER_AVAILABILITY_POLICY=HighlyAvailable
    - HOSTED_CLUSTER_INFRASTRUCTURE_AVAILABILITY_POLICY=HighlyAvailable
- name: network-fulfillment-ig
  options:
    labels:
      osac.openshift.io/project: osac-aap
  literals:
    - NETRIS_CONTROLLER_URL=https://redhat-ctl.netris.io
    - NETRIS_USERNAME=netris
    - NETRIS_SITE_ID=5
    - NETRIS_TENANT_ID=1
    - NETRIS_TENANT_NAME=Admin
# Configures bare metal host provisioning profiles.
# Copy files/profile.yaml.example to files/profile.yaml and define one entry per profile:
#   name: unique profile identifier
#   hostSelector: label selectors to match eligible bare metal hosts (e.g. managedBy, provisionState)
#   labels: labels applied to the host while this profile is active
#   persistentLabels: labels that remain on the host after the profile completes
#   hostTemplate: AAP job template to run for host-level provisioning
#   bareMetalPoolTemplate: AAP job template for pool-level operations (optional)
#   expectedTemplateParameters: list of required input parameters for the host template (optional)
# Then update this generator entry to use files/profile.yaml
- name: osac-profiles
  files:
    - files/profile.yaml.example

images:
  - name: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
    newName: quay.io/openshift/origin-cli
    newTag: "4.20.0"

patches:
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: fulfillment-controller
      spec:
        template:
          spec:
            containers:
              - name: controller
                imagePullPolicy: Always
  - target:
      kind: Deployment
      name: fulfillment-controller
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/command/7
        value: "--auth-issuer-url=https://keycloak.keycloak.svc.cluster.local/realms/osac"
      - op: replace
        path: /spec/template/spec/containers/0/command/11
        value: "--idp-url=https://keycloak.keycloak.svc.cluster.local"
  - target:
      kind: Deployment
      name: osac-operator-controller-manager
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_AAP_TEMPLATE_PREFIX
          value: osac
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_AAP_URL
          value: "https://osac-aap.osac-devel.apps.<cluster-name>.<base-domain>/api/controller"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_AAP_TOKEN
          valueFrom:
            secretKeyRef:
              name: osac-aap-api-token
              key: token
              optional: true
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_AAP_INSECURE_SKIP_VERIFY
          value: "true"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_AAP_STATUS_POLL_INTERVAL
          value: "30s"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_FULFILLMENT_SERVER_ADDRESS
          value: fulfillment-internal-api:8001
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_FULFILLMENT_TOKEN_FILE
          value: /var/run/secrets/kubernetes.io/serviceaccount/token
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Always
  - target:
      kind: ClusterRoleBinding
      name: osac-operator-manager-rolebinding
    patch: |-
      - op: replace
        path: /subjects/0/namespace
        value: osac-devel
  - target:
      kind: ClusterRoleBinding
      name: osac-operator-manager-rolebinding
    patch: |-
      - op: replace
        path: /subjects/0/name
        value: osac-operator-controller-manager
  - target:
      kind: ClusterRoleBinding
      name: bmf-operator-manager-rolebinding
    patch: |-
      - op: replace
        path: /subjects/0/namespace
        value: osac-devel
  - target:
      kind: ClusterRoleBinding
      name: bmf-operator-manager-rolebinding
    patch: |-
      - op: replace
        path: /subjects/0/name
        value: bmf-operator-controller-manager
  - target:
      kind: Deployment
      name: bmf-operator-controller-manager
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_AAP_TEMPLATE_PREFIX
          value: osac
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_AAP_URL
          value: "https://osac-aap.osac-devel.apps.<cluster-name>.<base-domain>/api/controller"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_AAP_TOKEN
          valueFrom:
            secretKeyRef:
              name: osac-aap-api-token
              key: token
              optional: true
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_AAP_INSECURE_SKIP_VERIFY
          value: "true"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OS_CLOUD
          valueFrom:
            secretKeyRef:
              name: bare-metal-fulfillment-ig
              key: OS_CLOUD
      - op: add
        path: /spec/template/spec/volumes/-
        value:
          name: os-clouds
          secret:
            secretName: osac-os-clouds
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Always
replacements:
- path: console-proxy-replacements.yaml
