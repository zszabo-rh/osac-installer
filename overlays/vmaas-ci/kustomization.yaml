apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: osac-e2e-ci

# This applies a name prefix to cluster-scoped resources (ClusterRoles,
# ClusterRoleBindings) but does not modify namespaced resources.
transformers:
- prefixTransformer.yaml

labels:
- includeSelectors: true
  pairs:
    app.kubernetes.io/managed-by: kustomize
    environment: ci

resources:
- ../../base

generatorOptions:
  disableNameSuffixHash: true

secretGenerator:
# This expects to find quay credentials in
# files/quay-pull-secret.json.
- name: quay-pull-secret
  files:
  - .dockerconfigjson=files/quay-pull-secret.json
  type: kubernetes.io/dockerconfigjson

# This expects to find an AAP license manifest
# in files/license.zip.
- name: config-as-code-manifest-ig
  files:
    - license.zip=files/license.zip
  options:
    labels:
      osac.openshift.io/project: osac-aap

- name: config-as-code-ig
  options:
    disableNameSuffixHash: true
  literals:
    - AAP_EE_IMAGE=ghcr.io/osac-project/osac-aap:sha-f130cf4
    - AAP_PROJECT_GIT_URI=https://github.com/osac-project/osac-aap
    - AAP_PROJECT_GIT_BRANCH=f130cf4504090609a70d9896aee18cdf56e2530e

- name: cluster-fulfillment-ig
  options:
    labels:
      osac.openshift.io/project: osac-aap

- name: network-fulfillment-ig
  options:
    labels:
      osac.openshift.io/project: osac-aap

configMapGenerator:
- name: publish-templates-ig
  literals:
    - OSAC_TEMPLATE_COLLECTIONS=osac.templates
    - OSAC_FULFILLMENT_SERVICE_URI=https://fulfillment-internal-api:8001

images:
  - name: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
    newName: quay.io/openshift/origin-cli
    newTag: "4.20.0"

patches:
  # kustomize nameReference tracking breaks when osac-operator and bmf-operator both contribute a
  # ServiceAccount originally named "controller-manager", causing the prefix transformer to reset
  # CRB subjects to the unresolved original. Pin them explicitly to work around the collision.
  - target:
      kind: ClusterRoleBinding
      name: osac-operator-manager-rolebinding
    patch: |-
      - op: replace
        path: /subjects/0/name
        value: osac-operator-controller-manager
      - op: replace
        path: /subjects/0/namespace
        value: osac-e2e-ci
  - target:
      kind: ClusterRoleBinding
      name: osac-operator-manager-admin-rolebinding
    patch: |-
      - op: replace
        path: /subjects/0/name
        value: osac-operator-controller-manager
      - op: replace
        path: /subjects/0/namespace
        value: osac-e2e-ci
  - target:
      kind: ClusterRoleBinding
      name: osac-operator-metrics-auth-rolebinding
    patch: |-
      - op: replace
        path: /subjects/0/name
        value: osac-operator-controller-manager
      - op: replace
        path: /subjects/0/namespace
        value: osac-e2e-ci
  - target:
      kind: ClusterRoleBinding
      name: bmf-operator-manager-rolebinding
    patch: |-
      - op: replace
        path: /subjects/0/name
        value: bmf-operator-controller-manager
      - op: replace
        path: /subjects/0/namespace
        value: osac-e2e-ci
  - target:
      kind: ClusterRoleBinding
      name: bmf-operator-metrics-auth-rolebinding
    patch: |-
      - op: replace
        path: /subjects/0/name
        value: bmf-operator-controller-manager
      - op: replace
        path: /subjects/0/namespace
        value: osac-e2e-ci
  - patch: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: fulfillment-controller
      spec:
        template:
          spec:
            containers:
              - name: controller
                imagePullPolicy: Always
  - target:
      kind: Deployment
      name: fulfillment-controller
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/command/7
        value: "--auth-issuer-url=https://keycloak.keycloak.svc.cluster.local/realms/osac"
      - op: replace
        path: /spec/template/spec/containers/0/command/11
        value: "--idp-url=https://keycloak.keycloak.svc.cluster.local"
  - target:
      kind: Deployment
      name: fulfillment-grpc-server
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/command/11
        value: "--grpc-authn-trusted-token-issuers=https://keycloak.keycloak.svc.cluster.local/realms/osac"
  - target:
      kind: Deployment
      name: osac-operator-controller-manager
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_ENABLE_COMPUTE_INSTANCE_CONTROLLER
          value: "true"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_ENABLE_TENANT_CONTROLLER
          value: "true"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_ENABLE_NETWORKING_CONTROLLER
          value: "true"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_AAP_TOKEN
          valueFrom:
            secretKeyRef:
              name: osac-aap-api-token
              key: token
              optional: true
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_AAP_INSECURE_SKIP_VERIFY
          value: "true"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_FULFILLMENT_SERVER_ADDRESS
          value: fulfillment-internal-api:8001
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OSAC_FULFILLMENT_TOKEN_FILE
          value: /var/run/secrets/kubernetes.io/serviceaccount/token
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: Always
replacements:
- path: console-proxy-replacements.yaml
