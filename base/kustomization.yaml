apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: osac

metadata:
  name: osac-base

resources:
  - osac-aap/config/base
  - osac-operator/config/default
  - osac-operator/config/console-proxy
  - osac-operator/config/console-proxy-kube-system
  - osac-fulfillment-service/manifests/overlays/openshift
  - hub-access
  - bare-metal-fulfillment-operator/config/default

# Common labels for all OSAC components
labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/part-of: osac

images:
- name: gomplate
  newName: docker.io/gomplate/gomplate
  newTag: latest
- name: postgres
  newName: quay.io/sclorg/postgresql-18-c10s
  newTag: latest
- name: ghcr.io/osac-project/fulfillment-service
  newTag: sha-69efc5b
- name: osac-aap
  newName: ghcr.io/osac-project/osac-aap
  newTag: sha-f130cf4
- name: ghcr.io/osac-project/osac-operator
  newTag: sha-db48159
- name: ghcr.io/osac-project/bare-metal-fulfillment-operator
  newTag: sha-0a06955
- name: envoy
  newName: ghcr.io/osac-project/envoy
  newTag: v1.33.0
- name: openshift-cli
  newName: image-registry.openshift-image-registry.svc:5000/openshift/cli
  newTag: latest

patches:
- target:
    kind: Namespace
    labelSelector: "control-plane=controller-manager"
  patch: |-
    apiVersion: v1
    kind: Namespace
    metadata:
      name: not-used
    $patch: delete
# Mark auth-reader with its real target namespace so overlay replacements can
# restore it after the namespace transformer overwrites kube-system.
- target:
    kind: RoleBinding
    name: osac-console-proxy-auth-reader
  patch: |-
    - op: add
      path: /metadata/annotations
      value:
        osac.openshift.io/deployment-namespace: kube-system

configurations:
- nameReference.yaml
