# OSAC VMaaS (VM-as-a-Service) CI Environment Values
# Replaces overlays/vmaas-ci/kustomization.yaml

# --- Operator ---
operator:
  image:
    repository: ghcr.io/osac-project/osac-operator
    tag: sha-8220502
    pullPolicy: Always
  provisioning:
    provider: "aap"
  aap:
    insecureSkipVerify: "true"
    tokenSecret:
      name: osac-aap-api-token
      key: token
  fulfillment:
    serverAddress: "fulfillment-internal-api:8001"
    tokenFile: "/var/run/secrets/kubernetes.io/serviceaccount/token"
  controllers:
    clusterOrder: false
    computeInstance: true
    tenant: true
    networking: true

# --- Fulfillment Service ---
service:
  externalHostname: ""  # Set to fulfillment-api-<namespace>.apps.<cluster>.<domain>
  internalHostname: ""  # Set to fulfillment-internal-api-<namespace>.apps.<cluster>.<domain>
  variant: openshift
  images:
    service: ghcr.io/osac-project/fulfillment-service:sha-d5113e5
    envoy: ghcr.io/osac-project/envoy:v1.33.0
  certs:
    issuerRef:
      kind: ClusterIssuer
      name: default-ca
    caBundle:
      configMap: ca-bundle
  auth:
    issuerUrl: https://keycloak.keycloak.svc.cluster.local/realms/osac
    emergencyServiceAccounts:
    - admin
    - osac-operator
    - osac-operator-controller-manager
    - template-publisher
    controllerCredentials:
    - secret:
        name: fulfillment-controller-credentials
        items:
        - key: client-id
          param: client-id
        - key: client-secret
          param: client-secret
  idp:
    provider: keycloak
    url: https://keycloak.keycloak.svc.cluster.local
    credentials:
    - secret:
        name: fulfillment-controller-credentials
        items:
        - key: client-id
          param: client-id
        - key: client-secret
          param: client-secret
  database:
    connection:
    - secret:
        name: fulfillment-db
        items:
        - key: url
          param: url
    - secret:
        name: postgres-client-cert-service
        items:
        - key: tls.crt
          param: sslcert
        - key: tls.key
          param: sslkey
        - key: ca.crt
          param: sslrootcert
  log:
    level: debug

# --- AAP ---
aap:
  aap:
    instance:
      enabled: true
      name: "osac-aap"
  bootstrap:
    enabled: true
    image: ghcr.io/osac-project/osac-aap:sha-e58e0c3
    cliImage: quay.io/openshift/origin-cli:4.20.0
    backoffLimit: 15
  configAsCode:
    manifestSecret: "config-as-code-manifest-ig"
    secret: "config-as-code-ig"
    eeImage: "ghcr.io/osac-project/osac-aap:sha-e58e0c3"
    projectGitUri: "https://github.com/osac-project/osac-aap"
    projectGitBranch: "e58e0c3c2707ddfcb0826ff467c9e9f1ef79923d"

# --- Validation ---
validation:
  enabled: true

# --- Bare Metal Fulfillment Operator ---
bmf:
  enabled: false

# --- Database migration ---
dbMigrate:
  enabled: false
  image: ghcr.io/osac-project/fulfillment-service:sha-d5113e5
