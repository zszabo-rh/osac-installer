# MetalLB instance
apiVersion: metallb.io/v1beta1
kind: MetalLB
metadata:
  name: metallb
  namespace: metallb-system
---
# MetalLB IPAddressPool and L2Advertisement for CaaS LoadBalancer services.
# Update the address range below to match your environment.
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: caas-address-pool
  namespace: metallb-system
spec:
  addresses:
    - ${METALLB_ADDRESS_CIDR}
  autoAssign: true
  avoidBuggyIPs: true  # safeguard: exclude .0 and .255 if the address range is ever extended
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: caas-l2-advertisement
  namespace: metallb-system
spec:
  ipAddressPools:
    - caas-address-pool
